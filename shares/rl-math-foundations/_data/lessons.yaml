meta:
  book: "Mathematical Foundations of Reinforcement Learning"
  author: "S. Zhao"
  year: 2025
  publisher: "Springer Nature Press"
  source_pdf_dir: "~/Documents/learn/强化学习的数学原理/Book-Mathematical-Foundation-of-Reinforcement-Learning"
  bilibili_playlist: "https://space.bilibili.com/2044042934"
  youtube_playlist: "https://youtube.com/playlist?list=PLEhdbSEZZbDaFWPX4gehhwB9vJZJ1DNm8"
  schema_version: 1
  # Index conventions:
  #   - youtube_index is 1-based and matches the YouTube playlist's `&index=` query param.
  #   - On YouTube the first entry (index 1) is the 30-min Overview video; lecture videos start at index 2.
  #   - bilibili_p assumes the Bilibili playlist mirrors the YouTube ordering with the Overview as P1.
  #     If the Bilibili upload diverges, this should be re-checked against
  #     https://space.bilibili.com/2044042934 directly.

chapters:
  - id: ch01
    number: 1
    title_en: "Basic Concepts"
    title_zh: "基本概念"
    pdf: "3 - Chapter 1 Basic Concepts.pdf"
    role: "全书的术语奠基章节。用一个 grid world 把 state / action / policy / reward / return / MDP 这些 RL 词汇全部装进同一个具体场景,后面九章所有公式都会回引这些定义。"
    lessons:
      - id: ch01-l01
        lesson_number: 1
        title_en: "Basic Concepts (P1 - State, action, policy, ...)"
        title_zh: "基本概念(P1):状态、动作与策略"
        bilibili_p: 2
        youtube_index: 2
        book_section: "1.1-1.4"
        book_pages: "1-5"
        teaser: "用一个 5x5 网格把 state、action、policy 三个词同时讲清楚"
        est_minutes: 20
        components_used: ["gridworld", "distribution-bar"]
      - id: ch01-l02
        lesson_number: 2
        title_en: "Basic Concepts (P2 - Reward, return, Markov decision process)"
        title_zh: "基本概念(P2):奖励、回报与马尔可夫决策过程"
        bilibili_p: 3
        youtube_index: 3
        book_section: "1.5-1.9"
        book_pages: "6-14"
        teaser: "为什么 reward 之外还要 return?同一条路径,两种打分会给出不同最优策略"
        est_minutes: 20
        components_used: ["gridworld", "equation-walkthrough"]

