          - id: dpo-theory
            title_zh: "DPO 理论基础"
            target_depth: L2
            priority: 4
            prerequisites: ["dpo-and-variants"]
          - id: kto
            title_zh: "KTO (Kahneman-Tversky Optimization)"
            target_depth: L1
            priority: 3
            prerequisites: ["dpo-and-variants"]
          - id: orpo
            title_zh: "ORPO"
            target_depth: L1
            priority: 3
            prerequisites: ["dpo-and-variants"]
          - id: simpo
            title_zh: "SimPO"
            target_depth: L1
            priority: 3
