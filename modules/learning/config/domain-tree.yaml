# Learning Pipeline — 领域知识树
# 6 大领域，~127 个概念节点
# 静态结构定义，由 /learn-init 初始化到 knowledge-map.yaml

meta:
  version: "1.0"
  created: "2026-03-25"
  root_topic: "SWE Post-Training"
  description: "以 SWE 后训练为核心的 LLM 知识体系"

domains:

  # ═══════════════════════════════════════════════════════════════
  # Domain 1: LLM 基础
  # ═══════════════════════════════════════════════════════════════
  llm-foundations:
    title: "LLM Foundations"
    title_zh: "LLM 基础"
    description: "大语言模型的核心技术基础，为理解后续 post-training 提供必要背景"
    vault_section: "10_Foundations/llm-foundations"

    subtopics:
      architecture:
        title: "Model Architecture"
        title_zh: "模型架构"
        concepts:
          - id: transformer-attention
            title_zh: "Transformer 与注意力机制"
            target_depth: L1
            priority: 3
          - id: positional-encoding
            title_zh: "位置编码（RoPE, ALiBi 等）"
            target_depth: L1
            priority: 2
          - id: mixture-of-experts
            title_zh: "混合专家模型 (MoE)"
            target_depth: L1
            priority: 3
          - id: long-context-architecture
            title_zh: "长上下文架构"
            target_depth: L1
            priority: 3
          - id: kv-cache-optimization
            title_zh: "KV Cache 优化"
            target_depth: L1
            priority: 2

      pretraining:
        title: "Pretraining"
        title_zh: "预训练"
        concepts:
          - id: pretraining-data-pipeline
            title_zh: "预训练数据 Pipeline"
            target_depth: L1
            priority: 2
          - id: scaling-laws
            title_zh: "Scaling Laws"
            target_depth: L2
            priority: 4
          - id: tokenization-for-code
            title_zh: "代码 Tokenization"
            target_depth: L1
            priority: 3
          - id: code-pretraining-mix
            title_zh: "代码预训练数据配比"
            target_depth: L2
            priority: 4
          - id: continual-pretraining
            title_zh: "持续预训练"
            target_depth: L2
            priority: 4

      inference:
        title: "Inference & Serving"
        title_zh: "推理与服务"
        concepts:
          - id: speculative-decoding
            title_zh: "投机解码"
            target_depth: L1
            priority: 2
          - id: quantization
            title_zh: "量化"
            target_depth: L1
            priority: 2
          - id: batching-strategies
            title_zh: "批处理策略"
            target_depth: L1
            priority: 2
          - id: model-parallelism
            title_zh: "模型并行"
            target_depth: L1
            priority: 2

