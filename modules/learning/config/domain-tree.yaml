    subtopics:
      sft-fundamentals:
        title: "SFT Fundamentals"
        title_zh: "SFT 基础"
        concepts:
          - id: instruction-tuning
            title_zh: "指令微调"
            target_depth: L2
            priority: 4
          - id: lora-peft
            title_zh: "LoRA / PEFT 参数高效微调"
            target_depth: L2
            priority: 4
          - id: data-quality-vs-quantity
            title_zh: "数据质量 vs 数量权衡"
            target_depth: L2
            priority: 4
          - id: catastrophic-forgetting
            title_zh: "灾难性遗忘"
            target_depth: L1
            priority: 3
          - id: curriculum-learning
            title_zh: "课程学习"
            target_depth: L2
            priority: 4

      rl-basics:
        title: "RL Alignment Basics"
        title_zh: "RL 对齐基础"
        concepts:
          - id: policy-gradient-theorem
            title_zh: "策略梯度定理"
            target_depth: L2
            priority: 5
            description: "所有 policy-based RL 方法的数学根基"
          - id: reinforce-algorithm
            title_zh: "REINFORCE 算法"
            target_depth: L2
            priority: 5
            prerequisites: ["policy-gradient-theorem"]
            description: "最基础的 policy gradient 方法，含 baseline 和 RLOO 变体"
          - id: rlhf-pipeline
            title_zh: "RLHF Pipeline"
            target_depth: L2
            priority: 5
            prerequisites: ["reinforce-algorithm", "reward-modeling"]
          - id: reward-modeling
            title_zh: "奖励建模"
            target_depth: L2
            priority: 5
          - id: reward-shaping
            title_zh: "Reward Shaping"
            target_depth: L2
            priority: 4
            prerequisites: ["reward-modeling"]
          - id: ppo-for-llm
            title_zh: "PPO 在 LLM 中的应用"
            target_depth: L2
            priority: 5
            prerequisites: ["reinforce-algorithm", "rlhf-pipeline"]
          - id: dpo-and-variants
            title_zh: "DPO 及变体"
            target_depth: L2
            priority: 4
            prerequisites: ["rlhf-pipeline"]

      advanced-rl:
        title: "Advanced RL Methods"
        title_zh: "高级 RL 方法"
        concepts:
          - id: grpo
            title_zh: "GRPO (Group Relative Policy Optimization)"
            target_depth: L3
            priority: 5
            prerequisites: ["ppo-for-llm", "reinforce-algorithm"]
          - id: dapo
            title_zh: "DAPO (Decoupled Clip and Dynamic Sampling Policy Optimization)"
            target_depth: L3
            priority: 5
            prerequisites: ["grpo", "process-reward-models"]
            description: "长 CoT RL 的开源可复现训练系统与算法改进，关注 Clip-Higher、Dynamic Sampling、Token-level PG Loss、Overlong Reward Shaping"
          - id: gspo
            title_zh: "GSPO (Group Sequence Policy Optimization)"
            target_depth: L3
            priority: 5
            prerequisites: ["grpo", "dapo"]
            description: "从 token-level importance ratio 转向 sequence-level clipping/rewarding/optimization 的 LLM RL 算法，重点关注 MoE RL 稳定性"
          - id: online-vs-offline-rl
            title_zh: "Online vs Offline RL"
            target_depth: L2
            priority: 4
            prerequisites: ["ppo-for-llm"]
          - id: process-reward-models
            title_zh: "过程奖励模型 (PRM)"
            target_depth: L3
            priority: 5
            prerequisites: ["reward-modeling"]
          - id: constitutional-ai
            title_zh: "Constitutional AI / RLAIF"
            target_depth: L1
            priority: 3
            prerequisites: ["rlhf-pipeline"]
          - id: reward-hacking-mitigations
            title_zh: "Reward Hacking 缓解"
            target_depth: L2
            priority: 4
            prerequisites: ["reward-modeling", "rlhf-pipeline"]

